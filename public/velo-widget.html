<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>VeloElec recommandations</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="header">
    <h1>🚲 Vélos recommandés</h1>
    <p>Les 3 meilleurs modèles selon votre profil.</p>
  </div>

  <div id="app" class="grid"></div>

  <script>
    function getResult(eventData) {
      return (
        eventData?.params?.result?.structuredContent ||
        eventData?.structuredContent ||
        eventData?.result ||
        {}
      );
    }

    function escapeText(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function callToolOrMessage(toolName, args, fallbackPrompt) {
      if (window.openai?.callTool) {
        await window.openai.callTool(toolName, args);
        return;
      }

      if (window.openai?.sendFollowUpMessage) {
        await window.openai.sendFollowUpMessage({
          prompt: fallbackPrompt,
          scrollToBottom: true
        });
        return;
      }

      window.parent.postMessage({
        jsonrpc: "2.0",
        id: crypto.randomUUID(),
        method: "ui/message",
        params: { prompt: fallbackPrompt }
      }, "*");
    }

    async function voirDetail(identifiant) {
      await callToolOrMessage(
        "detail_velo",
        { identifiant },
        `Montre-moi la fiche détaillée du vélo ${identifiant}`
      );
    }

    async function comparerAvecAutre(identifiant) {
      await callToolOrMessage(
        "comparer_velos",
        {
          identifiant_1: identifiant,
          identifiant_2: ""
        },
        `Je veux comparer le vélo ${identifiant} avec un autre modèle. Demande-moi lequel.`
      );
    }

    function render(result) {
      const velos = result?.recommandations || [];
      const app = document.getElementById("app");

      if (!velos.length) {
        app.innerHTML = `<div class="empty">Aucune recommandation disponible.</div>`;
        return;
      }

      app.innerHTML = velos.map((v, index) => {
        const identifiant = escapeText(v.id || v.modele || v.nom || "");
        const nom = escapeText(v.nom || "Vélo électrique");
        const marque = escapeText(v.marque || "Non renseignée");
        const categorie = escapeText(v.categorie || "Non renseignée");
        const batterie = escapeText(v.batterie || "Non renseignée");
        const image = escapeText(v.image_url || "");
        const prix = v.prix || "N/A";
        const score = v.score || 0;
        const couple = v.couple_moteur ? `${v.couple_moteur} Nm` : "Non renseigné";
        const poids = v.poids ? `${v.poids} kg` : "Non renseigné";
        const raisons = (v.raisons || []).slice(0, 4);

        return `
          <article class="card">
            ${image ? `<img src="${image}" alt="${nom}">` : ""}

            <div class="card-body">
              <span class="badge">#${index + 1} • Score ${score}/100</span>
              <h2>${nom}</h2>
              <div class="price">${prix} €</div>

              <div class="specs">
                <div><strong>Marque :</strong> ${marque}</div>
                <div><strong>Catégorie :</strong> ${categorie}</div>
                <div><strong>Batterie :</strong> ${batterie}</div>
                <div><strong>Couple :</strong> ${couple}</div>
                <div><strong>Poids :</strong> ${poids}</div>
              </div>

              <ul class="reasons">
                ${raisons.map(r => `<li>${escapeText(r)}</li>`).join("")}
              </ul>

              <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;">
                <button
                  style="border:0; border-radius:999px; padding:10px 12px; background:#111d2c; color:white; cursor:pointer;"
                  onclick="voirDetail('${identifiant}')">
                  Détails
                </button>

                <button
                  style="border:1px solid #e2e8f0; border-radius:999px; padding:10px 12px; background:white; color:#111d2c; cursor:pointer;"
                  onclick="comparerAvecAutre('${identifiant}')">
                  Comparer
                </button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    window.addEventListener("message", (event) => {
      render(getResult(event.data));
    });

    render({});
  </script>
</body>
</html>
