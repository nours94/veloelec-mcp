<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Détail vélo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="header">
    <h1>📄 Fiche vélo</h1>
    <p>Détail complet du modèle sélectionné.</p>
  </div>

  <div id="app"></div>

  <script>
    function getResult(eventData) {
      return (
        eventData?.params?.result?.structuredContent ||
        eventData?.structuredContent ||
        eventData?.result ||
        {}
      );
    }

    function escapeText(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function callToolOrMessage(toolName, args, fallbackPrompt) {
      if (window.openai?.callTool) {
        await window.openai.callTool(toolName, args);
        return;
      }

      if (window.openai?.sendFollowUpMessage) {
        await window.openai.sendFollowUpMessage({
          prompt: fallbackPrompt,
          scrollToBottom: true
        });
        return;
      }

      window.parent.postMessage({
        jsonrpc: "2.0",
        id: crypto.randomUUID(),
        method: "ui/message",
        params: { prompt: fallbackPrompt }
      }, "*");
    }

    async function comparer(identifiant) {
      await callToolOrMessage(
        "comparer_velos",
        { identifiant_1: identifiant, identifiant_2: "" },
        `Je veux comparer le vélo ${identifiant} avec un autre modèle. Demande-moi lequel.`
      );
    }

    async function nouvelleReco() {
      if (window.openai?.sendFollowUpMessage) {
        await window.openai.sendFollowUpMessage({
          prompt: "Aide-moi à trouver un autre vélo électrique adapté à mon profil.",
          scrollToBottom: true
        });
      }
    }

    function render(result) {
      const v = result?.velo || result;
      const app = document.getElementById("app");

      if (!v || !v.nom) {
        app.innerHTML = `<div class="empty">Aucun vélo sélectionné.</div>`;
        return;
      }

      const identifiant = escapeText(v.id || v.modele || v.nom || "");
      const nom = escapeText(v.nom || "Vélo électrique");
      const image = escapeText(v.image_url || "");
      const description = escapeText(v.description_ia || v.description || "");

      app.innerHTML = `
        <article class="card">
          ${image ? `<img src="${image}" alt="${nom}">` : ""}

          <div class="card-body">
            <span class="badge">${escapeText(v.categorie || "Vélo électrique")}</span>
            <h2>${nom}</h2>
            <div class="price">${v.prix || "N/A"} €</div>

            <div class="specs">
              <div><strong>Marque :</strong> ${escapeText(v.marque || "Non renseignée")}</div>
              <div><strong>Modèle :</strong> ${escapeText(v.modele || "Non renseigné")}</div>
              <div><strong>Moteur :</strong> ${escapeText(v.moteur || "Non renseigné")}</div>
              <div><strong>Batterie :</strong> ${escapeText(v.batterie || "Non renseignée")}</div>
              <div><strong>Autonomie :</strong> ${escapeText(v.autonomie || "Non renseignée")}</div>
              <div><strong>Couple :</strong> ${v.couple_moteur ? v.couple_moteur + " Nm" : "Non renseigné"}</div>
              <div><strong>Poids :</strong> ${v.poids ? v.poids + " kg" : "Non renseigné"}</div>
            </div>

            ${description ? `<p>${description}</p>` : ""}

            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;">
              <button
                style="border:0; border-radius:999px; padding:10px 12px; background:#111d2c; color:white; cursor:pointer;"
                onclick="comparer('${identifiant}')">
                Comparer
              </button>

              <button
                style="border:1px solid #e2e8f0; border-radius:999px; padding:10px 12px; background:white; color:#111d2c; cursor:pointer;"
                onclick="nouvelleReco()">
                Nouvelle recommandation
              </button>
            </div>
          </div>
        </article>
      `;
    }

    window.addEventListener("message", (event) => {
      render(getResult(event.data));
    });

    render({});
  </script>
</body>
</html>
